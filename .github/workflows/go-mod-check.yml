name: Check Rancher Go.mod Dependencies

on:
  workflow_dispatch:
  schedule:
    # 02:00, 10:00, 18:00 UTC daily
    - cron: '0 2,10,18 * * *'

permissions:
  contents: write

jobs:
  check-dependencies:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      DISCOVERY_MAX_AGE_DAYS: "30"
      DISCOVERY_TAGS_PER_LINE: "10"
      RANCHER_IMAGE_SOURCES: >-
        stgregistry.suse.com/rancher/rancher
        docker.io/rancher/rancher
        registry.rancher.com/rancher/rancher
        registry.suse.com/rancher/rancher
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version-file: scripts/compare-gomod/go.mod

      - name: Build compare-gomod
        run: |
          cd scripts/compare-gomod
          go build -o "$RUNNER_TEMP/compare-gomod" .
          echo "COMPARE_BIN=$RUNNER_TEMP/compare-gomod" >> "$GITHUB_ENV"

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip curl skopeo

      - name: Discover latest alpha per release line
        id: discover
        run: |
          set -euo pipefail

          : > /tmp/all-alphas.tsv

          for image in $RANCHER_IMAGE_SOURCES; do
            echo "::group::Inspecting $image"
            if ! tags_json=$(skopeo list-tags "docker://${image}" 2>/tmp/skopeo-tags.err); then
              echo "::warning::could not list tags for $image: $(cat /tmp/skopeo-tags.err)"
              echo "::endgroup::"
              continue
            fi

            mapfile -t tags < <(jq -r '.Tags[]
              | select(test("^v[0-9]+\\.[0-9]+\\.[0-9]+-alpha[0-9]+$"))' <<<"$tags_json" \
              | sort -Vr \
              | awk -F. -v limit="$DISCOVERY_TAGS_PER_LINE" '
                  {
                    key = $1 "." $2
                    if (++seen[key] <= limit) print
                  }
                ')

            for tag in "${tags[@]}"; do
              if awk -F'\t' -v tag="$tag" '$1 == tag { found=1 } END { exit !found }' /tmp/all-alphas.tsv; then
                continue
              fi
              if ! config_json=$(skopeo inspect --override-os linux --override-arch amd64 --config "docker://${image}:${tag}" 2>/tmp/skopeo-config.err); then
                echo "::warning::could not inspect $image:$tag: $(cat /tmp/skopeo-config.err)"
                continue
              fi
              jq -r --arg source "$image" --arg tag "$tag" --arg max_age_days "$DISCOVERY_MAX_AGE_DAYS" '
                def epoch: sub("\\.[0-9]+Z$"; "Z") | fromdateiso8601;
                .created as $created
                | select($created != null)
                | select(($created | epoch) > (now - (($max_age_days | tonumber) * 86400)))
                | [
                    $tag,
                    $created,
                    "image",
                    $source,
                    ((.config.Labels["org.opencontainers.image.revision"] // "")),
                    ([(.config.Env // [])[]? | select(startswith("CATTLE_RANCHER_WEBHOOK_VERSION=")) | sub("^CATTLE_RANCHER_WEBHOOK_VERSION="; "")] | first // "")
                  ] | @tsv
              ' <<<"$config_json" >> /tmp/all-alphas.tsv
            done
            echo "::endgroup::"
          done

          # Keep newest alpha per v2.X line by image creation date.
          # Output: <tag>\t<image_created>\t<source_kind>\t<image_source>\t<revision>\t<webhook_build>
          sort -t $'\t' -k2,2r /tmp/all-alphas.tsv | awk -F'\t' '
            {
              split($1, parts, ".")
              key = parts[1] "." parts[2]
              if (!seen[key]++) print
            }
          ' > /tmp/candidates.tsv

          echo "Discovered candidates (latest alpha image per line, last ${DISCOVERY_MAX_AGE_DAYS}d):"
          cat /tmp/candidates.tsv || true

          # Plain tag list used by the merge step below.
          cut -f1 /tmp/candidates.tsv > /tmp/candidates.txt

      - name: Read manual queue from README
        id: manual
        run: |
          set -euo pipefail
          # Manual queue lives between MANUAL-QUEUE markers. Every line that looks
          # like "- vX.Y.Z-suffix" is a pending request. Portable awk (no match()
          # capture groups).
          awk '
            /<!-- MANUAL-QUEUE:START -->/ { in_queue=1; next }
            /<!-- MANUAL-QUEUE:END -->/   { in_queue=0; next }
            in_queue && /^[[:space:]]*-[[:space:]]+v[0-9]+\.[0-9]+\.[0-9]+/ {
              sub(/^[[:space:]]*-[[:space:]]+/, "")
              sub(/[[:space:]].*$/, "")
              print
            }
          ' README.md > /tmp/manual.txt || : > /tmp/manual.txt

          echo "Manual queue entries:"
          cat /tmp/manual.txt || true

      - name: Process candidates
        id: process
        run: |
          set -euo pipefail

          # Merge discovery + manual. De-duplicate while preserving order (discovery first).
          cat /tmp/candidates.txt /tmp/manual.txt | awk 'NF && !seen[$0]++' > /tmp/to-process.txt

          if [ ! -s /tmp/to-process.txt ]; then
            echo "Nothing to process."
            echo "processed=" >> "$GITHUB_OUTPUT"
            echo "failed=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Versions to process:"
          cat /tmp/to-process.txt

          # Track successes (for manual queue cleanup) and failures.
          : > /tmp/succeeded.txt
          : > /tmp/failed.txt

          inspect_rancher_image() {
            local tag="$1"
            local image
            for image in $RANCHER_IMAGE_SOURCES; do
              if config_json=$(skopeo inspect --override-os linux --override-arch amd64 --config "docker://${image}:${tag}" 2>/dev/null); then
                jq -r --arg source "$image" --arg tag "$tag" '
                  [
                    $tag,
                    (.created // ""),
                    "image",
                    $source,
                    ((.config.Labels["org.opencontainers.image.revision"] // "")),
                    ([(.config.Env // [])[]? | select(startswith("CATTLE_RANCHER_WEBHOOK_VERSION=")) | sub("^CATTLE_RANCHER_WEBHOOK_VERSION="; "")] | first // "")
                  ] | @tsv
                ' <<<"$config_json"
                return 0
              fi
            done
            return 1
          }

          resolve_github_date() {
            local repo="$1" tag="$2"
            local out
            if out=$(curl -fsSL "https://api.github.com/repos/${repo}/releases/tags/${tag}" | jq -r '.published_at // .created_at // empty' 2>/dev/null) && [ -n "$out" ]; then
              printf '%s\n' "$out"
              return
            fi
            if out=$(curl -fsSL "https://api.github.com/repos/${repo}/commits/${tag}" | jq -r '.commit.committer.date // empty' 2>/dev/null) && [ -n "$out" ]; then
              printf '%s\n' "$out"
              return
            fi
          }

          while IFS= read -r VERSION; do
            [ -z "$VERSION" ] && continue

            # Compute release line (v2.X) from version tag.
            LINE=$(echo "$VERSION" | sed -E 's/^(v[0-9]+\.[0-9]+)\..*/\1/')
            REPORT_PATH="reports/$LINE/$VERSION.md"

            if [ -f "$REPORT_PATH" ]; then
              echo "Report already exists: $REPORT_PATH — skipping"
              # If this came from manual queue, still count as a success so we clean it up.
              if grep -qxF "$VERSION" /tmp/manual.txt; then
                echo "$VERSION" >> /tmp/succeeded.txt
              fi
              continue
            fi

            echo "::group::Processing $VERSION"

            # Look up Rancher image metadata. Discovery entries already have it;
            # manual queue entries are inspected against the configured registries.
            RANCHER_IMAGE_BUILT=$(awk -F'\t' -v t="$VERSION" '$1==t {print $2; exit}' /tmp/candidates.tsv)
            RANCHER_DATE_SOURCE=$(awk -F'\t' -v t="$VERSION" '$1==t {print $3; exit}' /tmp/candidates.tsv)
            RANCHER_IMAGE_SOURCE=$(awk -F'\t' -v t="$VERSION" '$1==t {print $4; exit}' /tmp/candidates.tsv)
            RANCHER_REVISION=$(awk -F'\t' -v t="$VERSION" '$1==t {print $5; exit}' /tmp/candidates.tsv)
            RANCHER_IMAGE_WEBHOOK_BUILD=$(awk -F'\t' -v t="$VERSION" '$1==t {print $6; exit}' /tmp/candidates.tsv)
            if [ -z "${RANCHER_IMAGE_BUILT:-}" ]; then
              if meta=$(inspect_rancher_image "$VERSION"); then
                RANCHER_IMAGE_BUILT=$(awk -F'\t' '{print $2; exit}' <<<"$meta")
                RANCHER_DATE_SOURCE=$(awk -F'\t' '{print $3; exit}' <<<"$meta")
                RANCHER_IMAGE_SOURCE=$(awk -F'\t' '{print $4; exit}' <<<"$meta")
                RANCHER_REVISION=$(awk -F'\t' '{print $5; exit}' <<<"$meta")
                RANCHER_IMAGE_WEBHOOK_BUILD=$(awk -F'\t' '{print $6; exit}' <<<"$meta")
              fi
            fi
            echo "rancher image built: ${RANCHER_IMAGE_BUILT:-unknown}"
            echo "rancher image source: ${RANCHER_IMAGE_SOURCE:-unknown}"
            echo "rancher revision: ${RANCHER_REVISION:-unknown}"

            # Download rancher source and extract go.mod + webhook version pin.
            RANCHER_URL="https://github.com/rancher/rancher/archive/refs/tags/${VERSION}.zip"
            if ! curl -L -f -o /tmp/rancher.zip "$RANCHER_URL"; then
              echo "::error::failed to download rancher source for $VERSION"
              echo "$VERSION" >> /tmp/failed.txt
              echo "::endgroup::"
              continue
            fi
            rm -rf /tmp/extract_rancher && mkdir /tmp/extract_rancher
            unzip -q /tmp/rancher.zip -d /tmp/extract_rancher
            RANCHER_DIR=$(find /tmp/extract_rancher -mindepth 1 -maxdepth 1 -type d | head -n1)

            if [ ! -f "$RANCHER_DIR/go.mod" ] || [ ! -f "$RANCHER_DIR/build.yaml" ]; then
              echo "::error::$VERSION: missing go.mod or build.yaml in extracted source"
              echo "$VERSION" >> /tmp/failed.txt
              echo "::endgroup::"
              continue
            fi

            cp "$RANCHER_DIR/go.mod" /tmp/rancher_go.mod

            WEBHOOK_BUILD=$(grep -E 'webhookVersion:' "$RANCHER_DIR/build.yaml" | sed 's/.*webhookVersion:[[:space:]]*//' | tr -d ' "' || true)
            if [ -z "$WEBHOOK_BUILD" ]; then
              echo "::error::$VERSION: no webhookVersion found in build.yaml"
              echo "$VERSION" >> /tmp/failed.txt
              echo "::endgroup::"
              continue
            fi
            if [ -n "${RANCHER_IMAGE_WEBHOOK_BUILD:-}" ] && [ "$RANCHER_IMAGE_WEBHOOK_BUILD" != "$WEBHOOK_BUILD" ]; then
              echo "::warning::$VERSION: image webhook pin $RANCHER_IMAGE_WEBHOOK_BUILD differs from build.yaml $WEBHOOK_BUILD; using build.yaml"
            fi
            WEBHOOK_TAG=$(echo "$WEBHOOK_BUILD" | sed -E 's/^[0-9]+\.[0-9]+\.[0-9]+\+up/v/')
            echo "webhook pin: $WEBHOOK_BUILD  ->  tag $WEBHOOK_TAG"

            WEBHOOK_URL="https://github.com/rancher/webhook/archive/refs/tags/${WEBHOOK_TAG}.zip"
            if ! curl -L -f -o /tmp/webhook.zip "$WEBHOOK_URL"; then
              echo "::warning::$VERSION: webhook tag $WEBHOOK_TAG not downloadable yet (will retry on next run)"
              echo "$VERSION" >> /tmp/failed.txt
              echo "::endgroup::"
              continue
            fi
            rm -rf /tmp/extract_webhook && mkdir /tmp/extract_webhook
            unzip -q /tmp/webhook.zip -d /tmp/extract_webhook
            WEBHOOK_DIR=$(find /tmp/extract_webhook -mindepth 1 -maxdepth 1 -type d | head -n1)
            if [ ! -f "$WEBHOOK_DIR/go.mod" ]; then
              echo "::error::$VERSION: webhook source has no go.mod"
              echo "$VERSION" >> /tmp/failed.txt
              echo "::endgroup::"
              continue
            fi
            cp "$WEBHOOK_DIR/go.mod" /tmp/webhook_go.mod

            WEBHOOK_PUBLISHED=$(resolve_github_date rancher/webhook "$WEBHOOK_TAG" || true)
            echo "webhook date: ${WEBHOOK_PUBLISHED:-unknown}"

            if ! "$COMPARE_BIN" compare \
              -version "$VERSION" \
              -webhook "$WEBHOOK_TAG" \
              -webhook-build "$WEBHOOK_BUILD" \
              ${RANCHER_IMAGE_BUILT:+-rancher-date "$RANCHER_IMAGE_BUILT"} \
              ${RANCHER_DATE_SOURCE:+-rancher-date-source "$RANCHER_DATE_SOURCE"} \
              ${RANCHER_IMAGE_SOURCE:+-rancher-image "$RANCHER_IMAGE_SOURCE:$VERSION"} \
              ${RANCHER_REVISION:+-rancher-revision "$RANCHER_REVISION"} \
              ${WEBHOOK_PUBLISHED:+-webhook-published "$WEBHOOK_PUBLISHED"} \
              /tmp/rancher_go.mod /tmp/webhook_go.mod; then
              echo "::error::$VERSION: compare failed"
              echo "$VERSION" >> /tmp/failed.txt
              echo "::endgroup::"
              continue
            fi

            echo "$VERSION" >> /tmp/succeeded.txt
            echo "::endgroup::"
          done < /tmp/to-process.txt

          echo "Succeeded:"; cat /tmp/succeeded.txt || true
          echo "Failed:";    cat /tmp/failed.txt    || true

          {
            echo "processed<<__EOF__"
            cat /tmp/succeeded.txt || true
            echo "__EOF__"
            echo "failed<<__EOF__"
            cat /tmp/failed.txt || true
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Clean up manual queue
        if: steps.process.outputs.processed != ''
        run: |
          set -euo pipefail
          # For each successfully processed version that was in the manual queue,
          # remove its "- vX.Y.Z..." line from the MANUAL-QUEUE block.
          while IFS= read -r VERSION; do
            [ -z "$VERSION" ] && continue
            if ! grep -qxF "$VERSION" /tmp/manual.txt; then
              continue
            fi
            # Delete the matching bullet line. Must stay inside MANUAL-QUEUE markers
            # to avoid nuking user prose elsewhere, so use a marker-aware awk pass.
            awk -v tag="$VERSION" '
              BEGIN { in_queue=0 }
              /<!-- MANUAL-QUEUE:START -->/ { in_queue=1; print; next }
              /<!-- MANUAL-QUEUE:END -->/   { in_queue=0; print; next }
              {
                if (in_queue && $0 ~ ("^[[:space:]]*-[[:space:]]+" tag "([[:space:]]|$)")) {
                  next
                }
                print
              }
            ' README.md > README.md.new && mv README.md.new README.md
          done < /tmp/succeeded.txt

      - name: Regenerate index and dashboard
        run: |
          "$COMPARE_BIN" index

      - name: Commit and push results
        run: |
          set -euo pipefail
          git config --local user.email "action@github.com"
          git config --local user.name  "github-actions[bot]"
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi
          git add README.md reports/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing staged."
            exit 0
          fi
          git commit -m "chore: update go.mod comparison reports"
          git push

      - name: Step summary
        if: always()
        run: |
          {
            echo "## Rancher go.mod check"
            echo ""
            if [ -s /tmp/succeeded.txt ]; then
              echo "### Processed"
              while IFS= read -r v; do [ -n "$v" ] && echo "- ✅ \`$v\`"; done < /tmp/succeeded.txt
              echo ""
            fi
            if [ -s /tmp/failed.txt ]; then
              echo "### Failed (will retry next run)"
              while IFS= read -r v; do [ -n "$v" ] && echo "- ⚠️ \`$v\`"; done < /tmp/failed.txt
              echo ""
            fi
            if [ ! -s /tmp/succeeded.txt ] && [ ! -s /tmp/failed.txt ]; then
              echo "_No versions processed._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
